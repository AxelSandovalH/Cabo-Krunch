<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#070707">
  <title>Datos de Pago — Cabo Krunch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;700&family=Bangers&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #C49A3C;
      --gold-lt: #E2C06A;
      --black:   #070707;
      --card:    #0d0d0d;
      --cream:   #F0EBE1;
      --muted:   #5A5552;
      --border-g: rgba(196,154,60,0.15);
      --border-w: rgba(240,235,225,0.06);
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      background: var(--black);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: max(48px, env(safe-area-inset-bottom, 48px));
    }

    /* HEADER */
    .header {
      padding: max(52px, env(safe-area-inset-top, 52px)) 24px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border-w);
    }
    .header-eyebrow {
      font-size: 0.52rem;
      font-weight: 500;
      letter-spacing: 0.48em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(3rem, 16vw, 5rem);
      letter-spacing: -0.01em;
      line-height: 0.9;
      color: var(--cream);
    }
    .header h1 em {
      color: var(--gold-lt);
      font-style: italic;
      display: block;
    }
    .header-sub {
      margin-top: 14px;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.12em;
    }

    /* SEC LABEL */
    .sec-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.52rem;
      font-weight: 500;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 32px 22px 16px;
    }
    .sec-label::before {
      content: '';
      width: 18px;
      height: 1px;
      background: var(--gold);
      flex-shrink: 0;
    }

    /* DATA CARD */
    .data-card {
      margin: 0 16px;
      background: var(--card);
      border: 1px solid var(--border-w);
      border-radius: 14px;
      overflow: hidden;
    }
    .data-row {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border-w);
      display: flex;
      flex-direction: column;
      gap: 5px;
      position: relative;
    }
    .data-row:last-child { border-bottom: none; }
    .data-label {
      font-size: 0.5rem;
      font-weight: 500;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .data-val {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.4rem;
      line-height: 1.2;
      color: var(--cream);
      letter-spacing: 0.01em;
    }
    .data-val.mono {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.06em;
    }
    .copy-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid var(--border-g);
      border-radius: 6px;
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.52rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .copy-btn:active { background: rgba(196,154,60,0.12); }
    .copy-btn.copied { color: #22c55e; border-color: rgba(34,197,94,0.3); }

    /* WHATSAPP */
    .wa-section { padding: 28px 16px 0; }
    .wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 17px 24px;
      border-radius: 100px;
      box-shadow: 0 6px 32px rgba(37,211,102,0.2);
      -webkit-tap-highlight-color: transparent;
      transition: transform .15s;
    }
    .wa-btn:active { transform: scale(0.97); }
    .wa-btn svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 36px 24px 0;
    }
    .footer-logo {
      font-family: 'Bangers', cursive;
      font-size: 1.3rem;
      letter-spacing: 4px;
      color: var(--gold);
      display: block;
      margin-bottom: 5px;
    }
    .footer-copy {
      font-size: 0.52rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #2a2826;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #161616;
      border: 1px solid var(--border-g);
      color: var(--cream);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 9px 22px;
      border-radius: 100px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s, transform .18s;
      z-index: 99;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <p class="header-eyebrow">Datos de Pago</p>
    <h1>Cabo<em>Krunch</em></h1>
    <p class="header-sub">Depósito · Transferencia · SPEI</p>
  </header>

  <!-- DATOS BANCARIOS -->
  <p class="sec-label">Cuenta</p>
  <div class="data-card">
    <div class="data-row">
      <span class="data-label">Nombre</span>
      <span class="data-val" id="nombre">René Rico Solís</span>
    </div>
    <div class="data-row">
      <span class="data-label">Banco</span>
      <span class="data-val">Banamex</span>
    </div>
    <div class="data-row">
      <span class="data-label">Número de Tarjeta</span>
      <span class="data-val mono" id="tarjeta">5204 1661 2069 2191</span>
      <button class="copy-btn" data-copy="tarjeta">Copiar</button>
    </div>
  </div>

  <!-- TELÉFONO -->
  <p class="sec-label">Contacto</p>
  <div class="data-card">
    <div class="data-row">
      <span class="data-label">Teléfono / WhatsApp</span>
      <span class="data-val mono" id="telefono">+52 1 624 240 9228</span>
      <button class="copy-btn" data-copy="telefono">Copiar</button>
    </div>
  </div>

  <!-- WHATSAPP -->
  <div class="wa-section">
    <a href="https://wa.me/5216242409228" class="wa-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
      </svg>
      Escribir por WhatsApp
    </a>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer-logo">CABO KRUNCH</span>
    <p class="footer-copy">Cabo San Lucas · B.C.S. · México</p>
  </footer>

  <div class="toast" id="toast">Copiado</div>

  <script>
    var toastTimer;
    function showToast() {
      var t = document.getElementById('toast');
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1600);
    }

    document.querySelectorAll('.copy-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id  = this.dataset.copy;
        var val = document.getElementById(id).textContent.trim();
        navigator.clipboard.writeText(val).then(function() {
          btn.textContent = 'Listo';
          btn.classList.add('copied');
          showToast();
          setTimeout(function(){ btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
        });
      });
    });
  </script>

</body>
</html>
